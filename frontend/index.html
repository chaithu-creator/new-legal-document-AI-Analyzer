<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e1b4b" />
    <meta name="description" content="LexIntel — AI-Powered Legal & Land Document Intelligence System" />
    <title>LexIntel — AI Legal Document Analyzer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#4f46e5',
              secondary: '#7c3aed',
              accent: '#06b6d4',
              dark: '#0f172a',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Inter', sans-serif; }
      .gradient-bg { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e3a5f 100%); }
      .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
      .card { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
      .risk-high { background: #fef2f2; border-left: 4px solid #ef4444; }
      .risk-medium { background: #fffbeb; border-left: 4px solid #f59e0b; }
      .risk-low { background: #f0fdf4; border-left: 4px solid #22c55e; }
      .clause-termination { border-left: 3px solid #ef4444; }
      .clause-liability { border-left: 3px solid #f97316; }
      .clause-payment { border-left: 3px solid #3b82f6; }
      .clause-confidentiality { border-left: 3px solid #8b5cf6; }
      .clause-general { border-left: 3px solid #6b7280; }
      .clause-dispute_resolution { border-left: 3px solid #14b8a6; }
      .clause-warranties { border-left: 3px solid #f59e0b; }
      .clause-intellectual_property { border-left: 3px solid #ec4899; }
      .clause-auto_renewal { border-left: 3px solid #ef4444; }
      .clause-penalty { border-left: 3px solid #dc2626; }
      .chat-bubble-user { background: #4f46e5; color: white; border-radius: 18px 18px 4px 18px; }
      .chat-bubble-ai { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 4px; }
      .scrollbar-thin::-webkit-scrollbar { width: 4px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }
    </style>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
